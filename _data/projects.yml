- name: Cantonese Level Up
  img: img/cantonese.png
  dates: Feburary 2026 - Present
  links:
    - label: Github
      url: "https://github.com/jdhe1120/cantonese-level-up"
  description: |
    Cantonese Level Up is an app I built for myself to improve my ability to understand and speak Cantonese.
    Leveraging Claude Code (with Opus 4.6), I've been able customize the language app to meet me exactly where I am today. It knows that I prefer an English UI, that I am already fluent at Mandarin, and that I already know some basic Cantonese, but want to dive deeper into the intermediate level.

- name: AorB Bot (PM & SWE AI Agent)
  img: img/aorb.png
  dates: June 2025 - December 2025
  links:
    - label: Demo
      url: ""
  description: |
    AorB is an AI Agent I built together with my classmate that served as both a PM and a SWE for mobile app developers. AorB automatically analyzed customer app store reviews, grouped and prioritized feedback, created PRDs, created tasks on linear, and then implemented the code changes and created a PR for review.
    To build this, we leveraged various LLMs, N8N, Linear, Github, and an open source project called Claude Hub (built on top of Claude Code).

- name: HBS AI Club Bot (Email and Admin AI Agent)
  img: img/hbs.png
  dates: August 2025
  links:
    - label: Demo
      url: ""
  description: |
    The HBS AI Club bot helped with handling administrative tasks including verifying membership fees were paid on Eventbrite, adding new club members to the Outlook group, and replying to member enquiries.
    To build this, I built a Microsoft Agent Flow (HBS is on M365 and allows Outlook actions only via Microsoft tools) which leveraged a mix of LLM calls and plain old Python and regex (regular expressions).

- name: WhatsApp Calendar Assistant Bot (Calendar AI Agent)
  img: img/whatsapp.png
  dates: November 2025
  links:
    - label: Demo
      url: ""
  description: |
    Using Twilio, Whatsapp's API, and N8N, I created a Whatsapp number that I could text to get personal logistical tasks done, such as adding or deleting events from my calendar, summarizing my emails, etc. 

- name: Harvard Open Data Project
  img: img/hodp.png
  dates: January 2017 - May 2020
  links:
    - label: Website
      url: "http://hodp.org/"
    - label: Github
      url: "https://github.com/Harvard-Open-Data-Project/harvard-open-data-project.github.io"
  description: |
    HODP is Harvard's first open data catalog. As a group, our mission is to use public Harvard data to increase transparency and tackle issues on campus.

    We've used data science and data visualization techniques to analyze data on <a href="https://medium.com/harvard-open-data-project/literally-nobody-voted-in-the-quincy-midterm-elections-409bf19a59cf">student government election turnout</a>, <a href="https://medium.com/harvard-open-data-project/gender-disparity-in-harvard-faculty-b253ae949a56">faculty gender disparity</a>, and <a href="https://medium.com/harvard-open-data-project/from-ec-to-tech-how-harvard-students-are-changing-concentrations-b748b55ed35b">trends in concentration popularity</a>.

- name: Facebook Message Analyzer
  img: img/fb.png
  dates: September 2018
  links:
    - label: GitHub
      url: "https://github.com/jdhe1120/facebook-message-analyzer"
  description: |
    This Python script allows you to analyze your FB messages. Specifically, for a given conversation, it prints out a map of the messages you (and others) have sent over time, the average word count of your mesages, and is set up in a way that lets you add any new features easily. I used this for a bootcamp as the Director of Education of the Harvard Computer Society.

- name: Datamatch
  img: img/datamatch.png
  dates: September 2016 - May 2018
  links:
    - label: Website
      url: "https://datamatch.me/"
    - label: Media
      url: "http://www.thecrimson.com/article/2016/2/26/datamatch-data-analysis/"
  description: |
    Datamatch is a matchmaking service used by ~4000 students each year at Harvard built with Ruby on Rails and React. As the web lead, I led the team in designing the credits and archives page.

- name: ProPublica Non-Profit Scraper
  img: img/propublica.png
  dates: December 2016
  links:
    - label: GitHub
      url: "https://github.com/Harvard-Open-Data-Project/propublica-data"
  description: |
    The ProPublica scraper is a python script that uses the <a href="https://projects.propublica.org/nonprofits/api">ProPublica API</a> to retrieve data in CSV format on any list of non-profit US organizations. We used the script to extract data on non-profit student organizations at Harvard.
