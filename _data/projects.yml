- name: ProPublica Non-Profit Scraper
  img: img/propublica.png
  alt: ProPublica logo
  dates: December 2016
  links:
    - label: GitHub
      url: "https://github.com/Harvard-Open-Data-Project/propublica-data"
  description: |
    The ProPublica scraper is a python script that uses the <a href="https://projects.propublica.org/nonprofits/api">ProPublica API</a> to retrieve data in CSV format on any list of non-profit US organizations. We used the script to extract data on non-profit student organizations at Harvard.
