- name: Cantonese Level Up
  img: img/cantonese.png
  alt: Cantonese Level Up logo
  dates: Feburary 2026 - Present
  links:
    - label: Github
      url: "https://github.com/jdhe1120/cantonese-level-up"
  description: |
    Cantonese Level Up is an app I built for myself to improve my ability to understand and speak Cantonese.
    Leveraging Claude Code (with Opus 4.6), I've been able customize the language app to meet me exactly where I am today. It knows that I prefer an English UI, that I am already fluent at Mandarin, and that I already understand some basic Cantonese, but that I want reach a more intermediate level.

- name: AorB Bot (PM & SWE AI Agent)
  img: img/aorb.png
  alt: AorB Bot logo
  dates: June 2025 - December 2025
  links:
    - label: Demo VIdeo
      url: "https://youtu.be/0nBPjAvFC8Q"
  description: |
    AorB is an AI Agent that serves as both a PM and a SWE for mobile app publishers. AorB automatically analyzes app store reviews, groupes and prioritizes feedback, creates PRDs, creates tasks on Linear, and implements the code changes along with a PR for review.
    I worked together with a classmate to build this, leveraging various LLMs, N8N, Linear, Github, and an open source project called Claude Hub (built on top of Claude Code).

- name: WhatsApp Personal Assistant Bot (Calendar AI Agent)
  img: img/whatsapp.png
  alt: WhatsApp logo
  dates: November 2025
  links:
    - label: Blog Walkthrough
      url: "/blog/2025/11/11/how-to-create-a-whatsapp-assistant-bot-using-n8n-twilio-and-whatsapps-api/"
  description: |
    Using Twilio, Whatsapp, N8N, and Claude Sonnet 4, I created a Whatsapp bot that I can text to get personal logistical tasks done, such as managing my Google Calendar. View my blog post for a beginner-friendly walkthrough of how to set one up yourself!

- name: HBS AI Club Bot (Admin AI Agent)
  img: img/hbs.png
  alt: Harvard Business School logo
  dates: August 2025
  links:
    - label: Blog Walkthrough (coming soon)
      url: ""
  description: |
    The HBS AI Club bot helped with handling administrative tasks including verifying membership fees were paid on Eventbrite, adding new club members to the Outlook group, and replying to member enquiries.
    I built this using a Microsoft Agent Flow (since HBS is on M365 and restricts us from calling the Outlook APIs from anything other than included Microsoft tools). Similar to N8N, the workflow leveraged a mix of LLM calls and plain old Python and regex (regular expressions) to handle the tasks.

- name: Harvard Open Data Project
  img: img/hodp.png
  alt: Harvard Open Data Project logo
  dates: January 2017 - May 2020
  links:
    - label: Website
      url: "http://hodp.org/"
    - label: Github
      url: "https://github.com/Harvard-Open-Data-Project/harvard-open-data-project.github.io"
  description: |
    HODP is Harvard's first open data catalog. As a group, our mission is to use public Harvard data to increase transparency and tackle issues on campus.

    We've used data science and data visualization techniques to analyze data on <a href="https://medium.com/harvard-open-data-project/literally-nobody-voted-in-the-quincy-midterm-elections-409bf19a59cf">student government election turnout</a>, <a href="https://medium.com/harvard-open-data-project/gender-disparity-in-harvard-faculty-b253ae949a56">faculty gender disparity</a>, and <a href="https://medium.com/harvard-open-data-project/from-ec-to-tech-how-harvard-students-are-changing-concentrations-b748b55ed35b">trends in concentration popularity</a>.

- name: Facebook Message Analyzer
  img: img/fb.png
  alt: Facebook logo
  dates: September 2018
  links:
    - label: GitHub
      url: "https://github.com/jdhe1120/facebook-message-analyzer"
  description: |
    This Python script allows you to analyze your FB messages. Specifically, for a given conversation, it prints out a map of the messages you (and others) have sent over time, the average word count of your mesages, and is set up in a way that lets you add any new features easily. I used this for a bootcamp as the Director of Education of the Harvard Computer Society.

