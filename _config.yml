title: Jeffrey He
email: jhe@mba2026.hbs.edu
bio: "Hi! I am currently pursuing an MBA (HBS '26) and previously studied Computer Science (Harvard '20). Some of my favorite things include teaching, music, and playing basketball!"
profile_img: img/profile.jpg
url: "https://jeffreydinghe.com"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
plugins:
  - jekyll-feed

# Blog post permalink structure
permalink: /blog/:year/:month/:day/:title/

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post

# Exclude dev/build files from the Jekyll site
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - css/input.css
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
